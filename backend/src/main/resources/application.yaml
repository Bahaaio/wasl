spring:
  application:
    name: wasl

  datasource:
    username: user
    password: password
    url: jdbc:postgresql://localhost:5432/wasl_db
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: true
        format_sql: true

  servlet:
    multipart:
      max-file-size: 105MB
      max-request-size: 110MB

  data:
    web:
      pageable:
        one-indexed-parameters: true

  docker:
    compose:
      enabled: true
      file: docker-compose.db.yml

security:
  jwt:
    secret: "/7LHCo1fbM7W2tuxaFndwPddh9krWcGqPxCS92TYI/CYNoWwRHClMz4yuxCc3AJAb9HlS8wRmJSYNSD37OSYzw=="
    expiration_ms: 900000 # 15 minutes
  refresh:
    size: 64
    expiration_days: 7

storage:
  location: "upload"

media:
  max_gif_size_mb: 5
  max_image_size_mb: 15
  max_video_size_mb: 100

  allowed_types:
    # image
    - image/jpeg
    - image/png
    - image/gif
    - image/webp

    # video
    - video/mp4
    - video/webm
    - video/quicktime